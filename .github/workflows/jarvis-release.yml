name: Jarvis Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install

      - name: Build Linux x64
        run: |
          bun run --cwd packages/opencode script/build.ts --single --skip-embed-web-ui --skip-install
        env:
          OPENCODE_VERSION: ${{ github.ref_name }}

      - name: Package binary
        run: |
          cd packages/opencode/dist/opencode-linux-x64/bin
          tar -czf jarvis-linux-x64.tar.gz jarvis
          mv jarvis-linux-x64.tar.gz "$GITHUB_WORKSPACE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Jarvis ${{ github.ref_name }}"
          body: |
            ## Jarvis ${{ github.ref_name }}

            WQ7036AX Jarvis Agent — SDK-aware coding agent for the V861 reGlasses platform.

            ### Install via npm
            ```bash
            npm install -g jarvis-herness-agent
            ```

            ### Manual Download
            - [jarvis-linux-x64.tar.gz](https://github.com/paullbuth-arch/jarvis-herness-agent/releases/download/${{ github.ref_name }}/jarvis-linux-x64.tar.gz)
          files: |
            jarvis-linux-x64.tar.gz

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > publish/.npmrc
          cd publish
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
