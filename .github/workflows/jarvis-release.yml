name: Jarvis Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install

      - name: Build Linux x64
        run: |
          bun run --cwd packages/opencode script/build.ts --single --skip-embed-web-ui --skip-install
        env:
          OPENCODE_VERSION: ${{ github.ref_name }}

      - name: Package binary
        run: |
          cd packages/opencode/dist/opencode-linux-x64/bin
          tar -czf ../../../../jarvis-linux-x64.tar.gz jarvis
          cd ../../../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Jarvis ${{ github.ref_name }}"
          body: |
            ## Jarvis ${{ github.ref_name }}

            WQ7036AX Jarvis Agent — SDK-aware coding agent for the V861 reGlasses platform.

            ### Install

            ```bash
            curl -fsSL https://github.com/paullbuth-arch/jarvis-herness-agent/releases/latest/download/install.sh | bash
            ```

            ### Manual Download

            - [jarvis-linux-x64.tar.gz](https://github.com/paullbuth-arch/jarvis-herness-agent/releases/download/${{ github.ref_name }}/jarvis-linux-x64.tar.gz)
          files: |
            packages/opencode/dist/jarvis-linux-x64.tar.gz
